name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate public Supabase variables
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "::error::NEXT_PUBLIC_SUPABASE_URL is empty"; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" || { echo "::error::NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY is empty"; exit 1; }
          echo "Supabase URL: $NEXT_PUBLIC_SUPABASE_URL"
          echo "Supabase key present: true"
          echo "Supabase key length: ${#NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"
          echo "Supabase key prefix: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:0:15}"
      - name: Probe Supabase REST authorization
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --header "apikey: $NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" \
            "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/roadmap_items?select=id&limit=1")
          echo "Supabase probe HTTP: $status"
          if [[ "$status" != "200" ]]; then
            echo "::error::Supabase rejected the configured publishable key (HTTP $status)"
            exit 1
          fi
      - name: Set build timestamp
        shell: bash
        run: echo "NEXT_PUBLIC_BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
